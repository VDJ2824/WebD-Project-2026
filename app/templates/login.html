<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login Portal</title>

<style>
* { margin:0; 
    padding:10px; 
    box-sizing:border-box; 
    font-family:Arial; }

body {
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4e73df,#1cc88a);
}

.container {
    background:white;
    padding:40px;
    border-radius:12px;
    width:350px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    text-align:center;
}

input, select {
    width:100%;
    padding:10px;
    margin-bottom:15px;
    border-radius:6px;
    border:1px solid #ccc;
}

.btn {
    width:100%;
    padding:10px;
    background:#2e59d9;
    color:white;
    border:none;
    cursor:pointer;
}

.error { color:red; margin-bottom:10px; }
</style>
</head>

<body>

<div class="container">
<h2>Login Portal</h2>

<form method="POST">
    {% csrf_token %}

    <input type="text" name="username" placeholder="Enter Username" required>
    <input type="password" name="password" placeholder="Enter Password" required>

    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

    <button class="btn" type="submit">Login</button>
</form>

<p style="margin-top:10px;">
    New user? <a href="{% url 'signup' %}">Register here</a>
</p>

</div>

</body>
</html>
