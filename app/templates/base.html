<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{% block title %}Research Portal{% endblock %}</title>

<style>
body {
    margin:0;
    display:flex;
    font-family: Arial;
    background:#f4f6f9;
}

/* Sidebar */
.sidebar {
    width:180px;
    background:#88a1ec;
    padding-top:20px;
}

.menu {
    list-style:none;
    padding:0;
}

.menu li {
    padding:12px 20px;
}

.menu a {
    text-decoration:none;
    color:white;
    display:block;
}

.menu li:hover {
    background:#5f7ee6;
}

/* Main */
.main {
    flex:1;
    padding:25px;
}

/* Topbar */
.top-bar {
    display:flex;
    justify-content:flex-end;
    margin-bottom:20px;
}

/* Cards */
.card {
    background:white;
    padding:15px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    transition:0.3s;
}

.card:hover { transform:translateY(-5px); }
</style>
</head>

<body>

<div class="sidebar">
    <ul class="menu">
        <li><a href="{% url 'dashboard' %}">🏠 Dashboard</a></li>
        <li><a href="{% url 'faculty' %}">👨‍🏫 Faculty</a></li>
    </ul>
</div>

<div class="main">

<div class="top-bar">
    <a href="{% url 'logout' %}">Logout</a>
</div>

{% block content %}{% endblock %}

</div>

</body>
</html>
